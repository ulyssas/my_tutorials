# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
minimal_mistakes_skin: "default"

locale: "en-US"
title: "My Tutorials"
email:
description: >- # this means to ignore newlines until "baseurl:"
  Hello! In this blog, I will post tips about MMD & Blender.
url: "https://ulyssas.github.io"
baseurl: "/my_tutorials"
repository: "ulyssas/my_tutorials"
enable_copy_code_button: true
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 8 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "Ulyssa"
  avatar: "/assets/images/bio-photo.png"
  bio: "Hi! I make extensions for Blender & Inkscape, and MMD & Blender tutorials."
  location: "Tokyo, Japan"
  timezone: "Asia/Tokyo"
  links:
    - label: "Homepage"
      icon: "fas fa-fw fa-link"
      url: "https://ulyssas.github.io"
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://www.youtube.com/@ulyssas"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ulyssas"
    - label: "GitLab"
      icon: "fab fa-fw fa-gitlab"
      url: "https://gitlab.com/WimPum"

footer:
  links:
    - label: "Homepage"
      icon: "fas fa-fw fa-home"
      url: "https://ulyssas.github.io"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ulyssas"
    - label: "Source"
      icon: "fas fa-fw fa-link"
      url: "https://github.com/ulyssas/my_tutorials"

atom_feed:
  hide: true

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
