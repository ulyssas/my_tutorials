{%- assign locale = page.locale | default: layout.locale | default: site.locale %}

<!DOCTYPE html>
<html lang="{{ locale | replace: '_', '-' | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <title>Redirecting&hellip;</title>
    {% include head.html %}

    <link rel="canonical" href="{{ page.redirect.to | absolute_url }}">
    <script>location="{{ page.redirect.to | absolute_url }}"</script>
    <meta http-equiv="refresh" content="0; url={{ page.redirect.to | absolute_url }}">
    <meta name="robots" content="noindex">
  </head>
  <body>
    <h1>Redirecting&hellip;</h1>
    <a href="{{ page.redirect.to | absolute_url }}">Click here if you are not redirected.</a>
  </body>
</html>
