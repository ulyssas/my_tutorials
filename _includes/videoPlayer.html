<!-- Feel free to change the width and height to your desired video size. -->

<div class="embed-container">
  <video controls preload="metadata" style="width:100%; border-radius:8px; background:#000;">
    <source src="{% if include.url contains '://' %}{{ include.url }}{% else %}{{ include.url | relative_url }}{% endif %}" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>
